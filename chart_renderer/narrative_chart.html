<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Narrative Chart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0F172A;
    overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    width: 1920px; height: 1080px;
  }

  svg { position: absolute; top: 0; left: 0; }

  /* ── Editorial title — top-left ── */
  #title-block {
    position: absolute; top: 36px; left: 56px; z-index: 10;
    max-width: 900px;
  }
  #title-block .title {
    color: #F8FAFC;
    font-size: 46px; font-weight: 700;
    line-height: 1.15; letter-spacing: -0.5px;
  }
  #title-block .subtitle {
    color: #94A3B8;
    font-size: 22px; font-weight: 400;
    margin-top: 8px; line-height: 1.4;
  }

  /* ── Shock flash overlay ── */
  #shock-flash {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(239, 83, 80, 0); z-index: 20;
    pointer-events: none; transition: background 0.08s;
  }

  /* ── Shock annotation ── */
  #annotation {
    position: absolute; z-index: 15;
    display: none; padding: 10px 18px;
    background: rgba(15, 23, 42, 0.88);
    border-left: 3px solid #EF4444;
    border-radius: 0 6px 6px 0;
  }
  #annotation .label {
    color: #EF4444;
    font-size: 18px; font-weight: 600;
  }
  #annotation .sub {
    color: #CBD5E1;
    font-size: 15px; margin-top: 4px;
  }

  /* ── Source ── */
  #source {
    position: absolute; bottom: 24px; right: 36px; z-index: 10;
    color: #475569; font-size: 13px; display: none;
  }

  /* ── Value badge ── */
  #badge {
    position: absolute; z-index: 15; display: none;
    padding: 4px 14px;
    border-radius: 4px;
    font-size: 16px; font-weight: 600;
  }
</style>
</head>
<body>
<div id="title-block">
  <div class="title" id="t-title"></div>
  <div class="subtitle" id="t-subtitle"></div>
</div>
<svg id="chart" width="1920" height="1080"></svg>
<div id="shock-flash"></div>
<div id="annotation">
  <div class="label" id="ann-label"></div>
  <div class="sub" id="ann-sub"></div>
</div>
<div id="source" id="t-source"></div>
<div id="badge"></div>

<script src="./d3.v7.min.js"></script>
</body>
</html>
